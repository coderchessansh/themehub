
<!DOCTYPE html>
<html>
<head>
<title>ThemeHub V2.2</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
transition:.3s;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
  }

input[type="color"]{
width:80px;
height:50px;
border:none;
cursor:pointer;
}

.color-preview{
display:inline-block;
width:20px;
height:20px;
border-radius:5px;
margin-left:5px;
border:1px solid white;
}
.card{
padding:20px;
border:2px solid #ccc;
border-radius:15px;
margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>🎨 ThemeHub V2.2</h1>

<p>Create your own theme!</p>

<div class="card">

<h3>Theme Name</h3>
<input type="text" id="themeName" placeholder="My Awesome Theme">

<h3>Background Color</h3>
<input type="color" id="bg" value="#ffffff">

<h3>Text Color</h3>
<input type="color" id="text" value="#000000">

<h3>Accent Color</h3>
<input type="color" id="accent" value="#5865f2">

<br><br>

<button onclick="saveTheme()">Save Theme</button>
<button onclick="exportTheme()">Export Theme</button>
<input type="file" id="importFile">
<button onclick="importTheme()">Import Theme</button>
</div>

<div class="card">

<h2>Preset Themes</h2>

<button onclick="discordTheme()">🟣 Discord</button>
<button onclick="darkTheme()">🌑 Dark</button>
<button onclick="lightTheme()">☀️ Light</button>
<button onclick="matrixTheme()">🟢 Matrix</button>
<button onclick="pinkTheme()">🌸 Pink</button>
</div>

<div class="card">

<h2>Preview</h2>

<p>This is preview text.</p>

<button id="previewButton">
Example Button
</button>

</div>

<div class="card">
    <h2>📚 Saved Themes</h2>
    <div id="themeList"></div>
</div>

</div>

<script>

function applyTheme(){

let bg =
document.getElementById("bg").value;

let text =
document.getElementById("text").value;

document.body.style.backgroundColor = bg;
document.body.style.color = text;

  applyAccent();
}

function applyAccent(){

let accent =
document.getElementById("accent").value;

document.querySelectorAll("button").forEach(button=>{

button.style.backgroundColor = accent;
button.style.color = "white";

});

}
function saveTheme(){

let themes =
JSON.parse(localStorage.getItem("themes") || "[]");

themes.push({
name: document.getElementById("themeName").value,
bg: document.getElementById("bg").value,
text: document.getElementById("text").value
});

localStorage.setItem(
"themes",
JSON.stringify(themes)
);

renderThemes();

alert("Theme Saved!");

}

function exportTheme(){

let theme={
name:document.getElementById("themeName").value,
bg:document.getElementById("bg").value,
text:document.getElementById("text").value
};

let blob=new Blob(
[JSON.stringify(theme,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="theme.json";
a.click();

  }

function importTheme(){

let file=
document.getElementById("importFile").files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(){

let theme=
JSON.parse(reader.result);

document.getElementById("themeName").value=
theme.name;

document.getElementById("bg").value=
theme.bg;

document.getElementById("text").value=
theme.text;

applyTheme();

};

reader.readAsText(file);

  }

function renderThemes(){

let container =
document.getElementById("themeList");

container.innerHTML = "";

let themes =
JSON.parse(localStorage.getItem("themes") || "[]");

themes.forEach((theme,index)=>{

let button =
document.createElement("button")
let deleteButton =
document.createElement("button");

deleteButton.innerText = "🗑️";

deleteButton.onclick = ()=>{

themes.splice(index,1);

localStorage.setItem(
"themes",
JSON.stringify(themes)
);

renderThemes();

};

button.innerText =
theme.name || ("Theme " + (index+1));

button.onclick = ()=>{

document.getElementById("themeName").value =
theme.name;

document.getElementById("bg").value =
theme.bg;

document.getElementById("text").value =
theme.text;

applyTheme();

};

container.appendChild(button);
container.appendChild(deleteButton);
});

}

function discordTheme(){
document.getElementById("bg").value="#313338";
document.getElementById("text").value="#ffffff";
applyTheme();
}

function darkTheme(){
document.getElementById("bg").value="#111111";
document.getElementById("text").value="#ffffff";
applyTheme();
}

function lightTheme(){
document.getElementById("bg").value="#ffffff";
document.getElementById("text").value="#000000";
applyTheme();
}

function matrixTheme(){
document.getElementById("bg").value="#000000";
document.getElementById("text").value="#00ff00";
applyTheme();
}

function pinkTheme(){
document.getElementById("bg").value="#ffb6c1";
document.getElementById("text").value="#4a004a";
applyTheme();
}

window.onload = ()=>{

let bg =
localStorage.getItem("bg");

let text =
localStorage.getItem("text");

if(bg){

document.getElementById("bg").value = bg;
document.getElementById("text").value = text;

applyTheme();

}

renderThemes();

document.getElementById("bg")
.addEventListener("input",applyTheme);

document.getElementById("text")
.addEventListener("input",applyTheme);

document.getElementById("accent")
.addEventListener("input",applyTheme);

};

</script>

</body>
</html>
